version: '3.8'


# Airflow кіөнҶө м„Өм •
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.5}
  environment:
    &airflow-common-env
    # 1. Executor м„Өм • (CeleryExecutor м„ нғқ)
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    # л©”нғҖлҚ°мқҙн„° м ҖмһҘмҶҢ
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    # мӣҢм»Өк°Җ мһ‘м—… кІ°кіјлҘј м ҖмһҘн•  м ҖмһҘмҶҢ
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    # мҠӨмјҖмӨ„лҹ¬мҷҖ мӣҢм»Ө мӮ¬мқҙмқҳ broker м—ӯн• мқ„ н•  м ҖмһҘмҶҢ
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    
    # 2. кё°ліё м„Өм •
    # мӢӨн–ү мӢң мһҗлҸҷ мғқм„ұлҗҳкұ°лӮҳ мһ„мқҳмқҳ л¬ёмһҗм—ҙ н•„мҡ” (н…ҢмҠӨнҠёмҡ© кіөлһҖ к°ҖлҠҘ)
    AIRFLOW__CORE__FERNET_KEY: '' 
    # DAG мғқм„ұ мӢң кё°ліё Pause мғҒнғң
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true' 
    # мҳҲм ң DAG лЎңл“ң м•Ҳ н•Ё (м§Җм Җл¶„н•ҙм§җ л°©м§Җ)
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false' 

    # 3. мӣ№ м„ңлІ„ кҙҖл Ё м„Өм •
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 300
    AIRFLOW__WEBSERVER__WORKERS: 2
    
    # 3. MinIO м—°лҸҷ мһҗлҸҷ м„Өм • (S3 Connection лҜёлҰ¬ мЈјмһ…)
    # нҳ•мӢқ: aws://<login>:<password>@?extra__aws__endpoint_url=<endpoint>
    AIRFLOW_CONN_MINIO_S3: "aws://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@?extra__aws__endpoint_url=http://minio:9000"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0" # лҰ¬лҲ…мҠӨ/WSL к¶Ңн•ң л¬ём ң л°©м§Җ
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  networks:
    - data-network

services:
  # ==========================================
  # 1. Infra (DB, Cache, Object Storage)
  # ==========================================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      # м»Ён…Ңмқҙл„Ҳ мғқм„ұ мӢң мөңкі  кҙҖлҰ¬мһҗ кі„м • мқҙлҰ„кіј нҢЁмҠӨмӣҢл“ң м§Җм •
      POSTGRES_USER: ${POSTGRES_USER:-airflow}         
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow} 
      POSTGRES_DB: ${POSTGRES_DB:-airflow}             
    ports:
      - "5432:5432"
    # лҚ°мқҙн„° мҳҒкө¬ м ҖмһҘмқ„ мң„н•ң volumn м—°кІ°
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - data-network

  redis: # CeleryExecutorлҘј мң„н•ң л©”мӢңм§Җ лёҢлЎңм»Ө
      image: redis:latest
      container_name: redis
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 30s
        retries: 3
      restart: always
      networks:
        - data-network

  minio:  # S3 нҳёнҷҳ мҠӨнҶ лҰ¬м§Җ (DL)
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: minio
    # м„ңлІ„ мӢӨн–ү лӘ…л №: лҚ°мқҙн„° л””л үнҶ лҰ¬ м§Җм • л°Ҹ мҪҳмҶ” нҸ¬нҠё кі м •
    command: minio server /data --console-address ":9001" --address ":9000"
    environment:
      # MinIO кҙҖлҰ¬мһҗ ID/PW (S3 Access Key / Secret Key м—ӯн• )
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" # API нҸ¬нҠё (Airflow л“ұ н”„лЎңк·ёлһЁмқҙ м ‘мҶҚ)
      - "9001:9001" # мӣ№ мҪҳмҶ” нҸ¬нҠё (лёҢлқјмҡ°м ҖлЎң м ‘мҶҚ)
    volumes:
      - ./minio_data:/data # лҚ°мқҙн„° мҳҒкө¬ м ҖмһҘ
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - data-network

  # ==========================================
  # 2. Airflow Core Components
  # ==========================================
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker: # мӢӨм ң мһ‘м—…мқ„ мҲҳн–үн•ҳлҠ” Celery Worker
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 30s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer: # (optional) л№„лҸҷкё° мһ‘м—…/м„јм„ң мөңм Ғнҷ”мҡ©. workerмқҳ кё°лӢӨлҰ¬лҠ” мһ‘м—…мқ„ кҙҖлҰ¬н•ҙмӨҖлӢӨ
    <<: *airflow-common
    command: triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-flower: # (optional) Celery Worker, Redis лӘЁлӢҲн„°л§Ғмҡ©
    <<: *airflow-common
    command: celery flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 30s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - data-network

  # ==========================================
  # 3. мҙҲкё°нҷ” (мөңмҙҲ мӢӨн–ү мӢң DB мғқм„ұ)
  # ==========================================
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\033[0m"
          echo "If you are on Linux/WSL, make sure to set .env file."
          echo
        fi
        # DB л§Ҳмқҙк·ёл Ҳмқҙм…ҳ л°Ҹ кҙҖлҰ¬мһҗ кі„м • мғқм„ұ
        airflow db migrate 
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}

  
networks:
  data-network:
    driver: bridge